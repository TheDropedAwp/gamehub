services:
  - type: web
    name: gamehub
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gamehub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_NAME
        value: GameHub
      - key: COOKIE_SECURE
        value: "true"
      - key: AUTO_SEED_ON_STARTUP
        value: "true"
      - key: REDIS_URL
        value: ""
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MODERATOR_EMAIL
        sync: false
      - key: MODERATOR_PASSWORD
        sync: false

databases:
  - name: gamehub-db
    plan: free
