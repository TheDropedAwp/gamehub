{% extends "base.html" %}

{% block content %}

<section class="auth-page">
    <form class="auth-card" method="post" action="/register">
        <h1>Регистрация</h1>
        <p>Создаётся обычный аккаунт пользователя. Стать разработчиком можно после входа.</p>

        {% if error %}
            <div class="alert">{{ error }}</div>
        {% endif %}

        <label>
            Почта
            <input type="email" name="email" required placeholder="user@mail.ru">
        </label>

        <label>
            Логин
            <input type="text" name="username" required placeholder="nickname">
        </label>

        <label>
            Пароль
            <input type="password" name="password" required placeholder="Минимум 6 символов">
        </label>

        <button class="btn primary full" type="submit">Создать аккаунт</button>

        <div class="form-footer">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </form>
</section>

{% endblock %}
